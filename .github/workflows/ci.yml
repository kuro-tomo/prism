name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  no-live-fire:
    # 実弾統制・CI掃討（forge-gates v3.1）：許可表(.forge/sinks-allow.txt)に無いファイルが
    # 外部発信の生砲口を含めば失敗する。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 実弾統制チェック（許可表外の生砲口を検出）
        run: bash .githooks/no-live-fire-check.sh
