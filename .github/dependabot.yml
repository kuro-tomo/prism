version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      version-minor-patch:
        update-types:
          - "minor"
          - "patch"
      security-minor-patch:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      version-minor-patch:
        update-types:
          - "minor"
          - "patch"
      security-minor-patch:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      version-minor-patch:
        update-types:
          - "minor"
          - "patch"
      security-minor-patch:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
